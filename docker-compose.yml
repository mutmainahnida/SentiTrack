services:
  redis:
    image: redis:alpine
    container_name: sentitrack-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: sentitrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sentitrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 236ndntm
    ports:
      - "5432:5432"
    volumes:
      - sentitrack-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sentitrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  scraper:
    build:
      context: ./scraper
    container_name: sentitrack-scraper
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
    volumes:
      - ./scraper/results:/app/results
      - ./scraper/cookies.json:/app/cookies.json
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend-api:
    build:
      context: ./backend-api
    container_name: sentitrack-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - PORT=5000
      - NODE_ENV=production
      - REQUIRED=JWT_ACCESS_SECRET,JWT_REFRESH_SECRET,DATABASE_URL,REDIS_HOST,REDIS_PORT,SCRAPER_BASE_URL,GEMINI_API_KEY
      - REDIS_HOST=sentitrack-redis
      - REDIS_PORT=6379
      - SCRAPER_BASE_URL=http://sentitrack-scraper:3000
      - DATABASE_URL=postgresql://postgres:236ndntm@sentitrack-postgres:5432/sentitrack?schema=public
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      scraper:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: sentitrack-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
    depends_on:
      - backend-api

volumes:
  sentitrack-postgres-data:
