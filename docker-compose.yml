services:
  redis:
    image: redis:alpine
    container_name: sentitrack-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: sentitrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sentitrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 236ndntm
    ports:
      - "5432:5432"
    volumes:
      - sentitrack-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sentitrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  scraper:
    build:
      context: ./scraper
    container_name: sentitrack-scraper
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=sentitrack-redis
      - REDIS_PORT=6379
    volumes:
      - ./scraper/results:/app/results
      - ./scraper/cookies.json:/app/cookies.json

  indobert-classifier:
    build:
      context: ./indobert-classifier
    container_name: sentitrack-indobert
    environment:
      - DEVICE=${DEVICE:-cpu}
      - BATCH_SIZE=${BATCH_SIZE:-32}
      - MAX_LENGTH=${MAX_LENGTH:-128}
      - REDIS_HOST=sentitrack-redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://sentitrack-redis:6379

  backend-api:
    build:
      context: ./backend-api
    container_name: sentitrack-backend
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    env_file:
      - .env
    environment:
      - PORT=${BACKEND_PORT}
      - NODE_ENV=production
      - REQUIRED=JWT_ACCESS_SECRET,JWT_REFRESH_SECRET,DATABASE_URL,REDIS_HOST,REDIS_PORT,GEMINI_API_KEY
      - REDIS_HOST=sentitrack-redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgresql://postgres:236ndntm@sentitrack-postgres:5432/sentitrack?schema=public
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: sentitrack-frontend
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    env_file:
      - .env
    environment:
      - PORT=${FRONTEND_PORT}
      - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT}
    depends_on:
      - backend-api

volumes:
  sentitrack-postgres-data:
