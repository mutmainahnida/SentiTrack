version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: sentitrack-redis
    ports:
      - "6379:6379"

  scraper:
    build:
      context: ./scraper
    container_name: sentitrack-scraper
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
    volumes:
      - ./scraper/results:/app/results
      - ./scraper/cookies.json:/app/cookies.json

  backend-api:
    build:
      context: ./backend-api
    container_name: sentitrack-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - PORT=5000
      - REDIS_HOST=sentitrack-redis
      - SCRAPER_BASE_URL=http://sentitrack-scraper:3001
    depends_on:
      - redis
      - scraper

  frontend:
    build:
      context: ./frontend
    container_name: sentitrack-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
    depends_on:
      - backend-api
