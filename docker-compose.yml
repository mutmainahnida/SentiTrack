services:
  redis:
    image: redis:alpine
    container_name: sentitrack-redis
    networks:
      - sentitrack-net
    ports:
      - "${REDIS_EXTERNAL_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
  postgres:
    image: postgres:16-alpine
    container_name: sentitrack-postgres
    networks:
      - sentitrack-net
    restart: unless-stopped
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: sentitrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sentitrack"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
  backend-api:
    build:
      context: ./backend-api
      args:
        NODE_ENV: production
    shm_size: 64mb
    container_name: sentitrack-backend-api
    networks:
      - sentitrack-net
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
      SCRAPER_PORT: ${SCRAPER_PORT:-5001}
      INDOBERT_PORT: ${INDOBERT_PORT:-5002}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-changeme}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@postgres:5432/sentitrack?schema=public
      SCRAPER_BASE_URL: http://scraper:5001
      INDOBERT_BASE_URL: http://indobert-classifier:5002
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
  scraper:
    build:
      context: ./scraper
    shm_size: 128mb
    container_name: sentitrack-scraper
    networks:
      - sentitrack-net
    restart: unless-stopped
    ports:
      - "${SCRAPER_PORT:-5001}:5001"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SCRAPER_PORT: ${SCRAPER_PORT:-5001}
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
    volumes:
      - ./scraper/cookies.json:/app/cookies.json:ro
      - ./scraper/results:/app/results
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  indobert-classifier:
    build:
      context: ./indobert-classifier
    container_name: sentitrack-indobert-classifier
    networks:
      - sentitrack-net
    ports:
      - "${INDOBERT_PORT:-5002}:5002"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DEVICE: cpu
      BATCH_SIZE: ${BATCH_SIZE:-32}
      MAX_LENGTH: ${MAX_LENGTH:-128}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      MODEL_NAME: ${MODEL_NAME:-Aardiiiiy/indobertweet-base-Indonesian-sentiment-analysis}
      HF_HOME: /root/.cache/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - hf_model_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_TELEMETRY_DISABLED: "1"
    shm_size: 64mb
    container_name: sentitrack-frontend
    networks:
      - sentitrack-net
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend-api
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://backend-api:5000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

networks:
  sentitrack-net:
    driver: bridge

volumes:
  postgres_data:
  hf_model_cache:
